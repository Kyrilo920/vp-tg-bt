services:
  postgres:
    image: postgres:16-alpine
    container_name: vape_shop_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vape_user
      POSTGRES_PASSWORD: vape_pass
      POSTGRES_DB: vape_shop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: