services:
  postgres:
    image: postgres:16-alpine
    container_name: vape_shop_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vape_user
      POSTGRES_PASSWORD: vape_pass
      POSTGRES_DB: vape_shop
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build: .
    container_name: vape_shop_bot
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://vape_user:vape_pass@postgres:5432/vape_shop

volumes:
  postgres_data: